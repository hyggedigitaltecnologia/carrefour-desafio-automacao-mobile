name: Testes Mobile Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Executar lint
        run: npm run lint

  smoke-tests:
    name: Smoke Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias
        run: npm ci

      - name: Criar diretorios de reports
        run: mkdir -p reports screenshots

      - name: Baixar APK
        run: |
          curl -L -o apps/android.wdio.native.app.v2.2.0.apk \
            https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Criar AVD e gerar snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD snapshot gerado"

      - name: Iniciar Appium em background
        run: |
          npx appium --relaxed-security --log ./appium.log &
          sleep 5

      - name: Executar testes de smoke
        id: smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            npx wdio config/wdio.android.conf.js --mochaOpts.grep '@smoke' || echo "TESTS_FAILED=true" >> $GITHUB_ENV
        env:
          DEVICE_NAME: emulator-5554

      - name: Gerar summary dos smoke tests
        if: always()
        run: |
          if [ -f reports/results-*.xml ]; then
            python3 .github/scripts/generate_summary.py "$(ls reports/results-*.xml | head -1)" "Smoke Tests Mobile" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Nenhum resultado XML encontrado" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload relatorio smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            reports/
            screenshots/
            allure-results/
            appium.log
          retention-days: 7

      - name: Falhar se testes falharam
        if: env.TESTS_FAILED == 'true'
        run: exit 1

  regression-tests:
    name: Regression Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias
        run: npm ci

      - name: Criar diretorios de reports
        run: mkdir -p reports screenshots

      - name: Baixar APK
        run: |
          curl -L -o apps/android.wdio.native.app.v2.2.0.apk \
            https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Criar AVD e gerar snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD snapshot gerado"

      - name: Iniciar Appium em background
        run: |
          npx appium --relaxed-security --log ./appium.log &
          sleep 5

      - name: Executar suite completa de regressao
        id: regression
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            npx wdio config/wdio.android.conf.js || echo "TESTS_FAILED=true" >> $GITHUB_ENV
        env:
          DEVICE_NAME: emulator-5554

      - name: Gerar summary da regressao
        if: always()
        run: |
          if [ -f reports/results-*.xml ]; then
            python3 .github/scripts/generate_summary.py "$(ls reports/results-*.xml | head -1)" "Suite de Regressao Mobile" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Nenhum resultado XML encontrado" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publicar resultado dos testes
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Mobile Test Report
          path: reports/results-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload relatorio de regressao
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: |
            reports/
            screenshots/
            allure-results/
            appium.log
          retention-days: 30

      - name: Falhar se testes falharam
        if: env.TESTS_FAILED == 'true'
        run: exit 1
